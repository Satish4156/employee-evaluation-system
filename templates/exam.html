<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Annotation Assessment</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial,sans-serif;
            padding-top:30px;
        }

        .exam-container{
            max-width:1200px;
            margin:auto;
        }

        .top-title{
            font-size:32px;
            font-weight:700;
            margin-bottom:25px;
            color:#111827;
        }

        .progress{
            height:10px;
            border-radius:30px;
            margin-bottom:30px;
            overflow:hidden;
            background:#dbeafe;
        }

        .progress-bar{
            background:#0d6efd;
            height:100%;
        }

        .question-card{
            background:white;
            border-radius:18px;
            padding:32px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .scenario-box{
            background:#f9fafb;
            padding:24px;
            border-radius:14px;
            margin-bottom:30px;
            border:1px solid #e5e7eb;
            color:#374151;
            line-height:1.8;
        }

    </style>

</head>

<body>

<div class="container exam-container">

    <div class="top-title">

        Annotation Tool

    </div>

    <div class="progress">

        <div class="progress-bar"
             style="width: {{ progress_percent }}%;">

        </div>

    </div>

    <div class="question-card">

        <h3>

            Scenario Review

        </h3>

        <div class="scenario-box">

            {{ question['Scenario'] }}

        </div>

        <form method="POST" action="/exam">

            {% for tag in tags %}

            <div class="form-check mb-2">

                <input
                    class="form-check-input"
                    type="checkbox"
                    name="answers"
                    value="{{ tag }}"
                    id="tag{{ loop.index }}">

                <label
                    class="form-check-label"
                    for="tag{{ loop.index }}">

                    {{ tag }}

                </label>

            </div>

            {% endfor %}

            <button
                type="submit"
                name="action"
                value="submit"
                class="btn btn-success mt-3">

                Submit & Next

            </button>

        </form>

    </div>

</div>

</body>
</html>
