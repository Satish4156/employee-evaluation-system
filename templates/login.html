<!DOCTYPE html>
<html>
<head>
    <title>Employee Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-box">

    <h2>Employee Login</h2>

    <form method="POST">

        <input
            type="text"
            name="employee_id"
            placeholder="Enter Employee ID"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
