<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Assessment Completed</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .completed-card{

            max-width:600px;
            margin:100px auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            text-align:center;
        }

        .success-icon{

            font-size:70px;
            margin-bottom:20px;
        }

        .title{

            font-size:34px;
            font-weight:700;
            margin-bottom:15px;
            color:#111827;
        }

        .score{

            font-size:24px;
            margin-top:20px;
            color:#2563eb;
            font-weight:700;
        }

        .btn-home{

            margin-top:30px;
            padding:12px 25px;
            border-radius:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="completed-card">

    <div class="success-icon">

        ✅

    </div>

    <div class="title">

        Assessment Completed

    </div>

    <p>

        Thank you for completing the annotation assessment.

    </p>

    <div class="score">

        Score :
        {{ score }} / {{ total }}

    </div>

    <a href="/logout"
       class="btn btn-primary btn-home">

        Logout

    </a>

</div>

</body>
</html>
